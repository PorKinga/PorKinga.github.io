{% extends "layout.html" %}

{% block title %}Edit pizza{% endblock %}

{% block content %}
<h1>Edit Pizza</h1>

<form method="post">
    <label>Name</label>
    <input type="text" name="name" value="{{ pizza.name }}" required>

    <label>Price</label>
    <input type="text" name="price" value="{{ pizza.price }}" required>

    <label>Description</label>
    <textarea name="description" required>{{ pizza.description }}</textarea>

    <button type="submit">Save</button>
</form>

<a href="{{ url_for('pizza_index') }}">back to list</a>
{% endblock %}
